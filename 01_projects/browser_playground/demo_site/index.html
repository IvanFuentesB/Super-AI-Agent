<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Playground Demo</title>
    <style>
      body {
        font-family: Segoe UI, Arial, sans-serif;
        margin: 0;
        background: #f3f6fb;
        color: #1b1f23;
      }

      .panel {
        max-width: 720px;
        margin: 72px auto;
        padding: 32px;
        background: #ffffff;
        border: 1px solid #d0d7de;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      button {
        padding: 12px 18px;
        border: 0;
        border-radius: 10px;
        background: #0969da;
        color: #ffffff;
        font-size: 16px;
        cursor: pointer;
      }

      .status {
        margin-top: 20px;
        padding: 16px;
        border-radius: 12px;
        background: #f6f8fa;
        border: 1px solid #d8dee4;
      }

      .status.clicked {
        background: #dff3e4;
        border-color: #2da44e;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Browser Playground</h1>
      <p>This page exists only for a deterministic local Playwright smoke test.</p>
      <button id="demo-button" type="button">Run deterministic click</button>
      <section id="status-box" class="status">
        <strong>Status:</strong>
        <span id="status-text">Waiting for click</span>
      </section>
    </main>

    <script>
      const button = document.getElementById("demo-button");
      const statusBox = document.getElementById("status-box");
      const statusText = document.getElementById("status-text");

      button.addEventListener("click", () => {
        statusText.textContent = "Click confirmed";
        statusBox.classList.add("clicked");
        button.textContent = "Click completed";
        button.setAttribute("data-clicked", "yes");
      });
    </script>
  </body>
</html>
